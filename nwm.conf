#!/bin/sh
nwmc vertical_gaps 20
nwmc horizontal_gaps 20
nwmc border_size 4
nwmc resize_amount 2
nwmc move_amount 20
nwmc minimum_size 50
nwmc number_of_desktops 3
#nwmc desktop_names "一 二 三 四 五 六 七 八 九 十"
nwmc desktop_names "一 二 三"

nwmc focused_border_color ffc4a7e7L
nwmc normal_border_color ff26233aL

# CHECK IF THESE STRIGS GET ALLOCATED OR COPIED OR JUST USED IN CONFIG.C
# they should be allocated and memcopied?

# to add swapping

mod="alt"

nwmc bind clear

nwmc bind "Print" spawn "/home/ethan/.config/scripts/scrot.sh 0"
nwmc bind "ctrl Print" spawn "/home/ethan/.config/scripts/scrot.sh 1"

nwmc bind "$mod Button1" drag_move_window 0
nwmc bind "$mod Button3" drag_resize_window 0

nwmc bind "XF86AudioRaiseVolume" spawn "amixer set Master 5%+"
nwmc bind "XF86AudioLowerVolume" spawn "amixer set Master 5%-"
nwmc bind "XF86AudioMute" spawn "amixer set Master toggle"

nwmc bind "$mod shift q" exit 0
nwmc bind "$mod f" float_toggle 0
nwmc bind "$mod space" focus_toggle 0

nwmc bind "$mod s" spawn "st"
nwmc bind "$mod b" spawn "chromium"
nwmc bind "$mod r" spawn "/home/ethan/neowm/nwm.conf"
nwmc bind "$mod q" kill_window 0
nwmc bind "$mod a" spawn "rofi -show drun"

nwmc bind "$mod k" focus_window up
nwmc bind "$mod j" focus_window down
nwmc bind "$mod h" focus_window left
nwmc bind "$mod l" focus_window right

nwmc bind "$mod control k" swap_window up
nwmc bind "$mod control j" swap_window down
nwmc bind "$mod control h" swap_window left
nwmc bind "$mod control l" swap_window right

# for floating
nwmc bind "$mod k" move_window up
nwmc bind "$mod j" move_window down
nwmc bind "$mod h" move_window left
nwmc bind "$mod l" move_window right

nwmc bind "$mod shift k" resize_window up
nwmc bind "$mod shift j" resize_window down
nwmc bind "$mod shift h" resize_window left
nwmc bind "$mod shift l" resize_window right

nwmc bind "$mod 1" focus_desktop 0
nwmc bind "$mod 2" focus_desktop 1
nwmc bind "$mod 3" focus_desktop 2
nwmc bind "$mod 4" focus_desktop 3
