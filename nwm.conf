#!/bin/sh
./nwmc vertical_gaps 20
./nwmc horizontal_gaps 20
./nwmc border_size 4
./nwmc resize_amount 4
./nwmc number_of_desktops 2

./nwmc border_focus_color ffc4a7e7L
./nwmc border_normal_color ff26233aL

# CHECK IF THESE STRIGS GET ALLOCATED OR COPIED OR JUST USED IN CONFIG.C
./nwmc bind clear
./nwmc bind "alt q" exit 0
./nwmc bind "alt a" spawn "st"
./nwmc bind "alt x" kill_window 0
./nwmc bind "alt s" spawn "rofi -normal-window -show drun"
./nwmc bind "alt h" focus_switch 0
./nwmc bind "alt l" focus_switch 1
./nwmc bind "alt j" focus_switch 2
./nwmc bind "alt k" focus_switch 3

./nwmc bind "alt shift h" resize_window 2
./nwmc bind "alt shift j" resize_window 1
./nwmc bind "alt shift k" resize_window 0
./nwmc bind "alt shift l" resize_window 3

./nwmc bind "alt 1" switch_desktop 0
./nwmc bind "alt 2" switch_desktop 1
