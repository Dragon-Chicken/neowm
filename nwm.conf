#!/bin/sh
nwmc vertical_gaps 20
nwmc horizontal_gaps 20
nwmc border_size 4
nwmc resize_amount 4
nwmc number_of_desktops 2

nwmc focused_border_color ffc4a7e7L
nwmc normal_border_color ff26233aL

# CHECK IF THESE STRIGS GET ALLOCATED OR COPIED OR JUST USED IN CONFIG.C

mod="alt"

nwmc bind clear
nwmc bind "$mod shift q" exit 0
nwmc bind "$mod a" spawn "st"
nwmc bind "$mod q" kill_window 0
nwmc bind "$mod s" spawn "rofi -normal-window -show run"
nwmc bind "$mod h" focus_switch 0
nwmc bind "$mod l" focus_switch 1
nwmc bind "$mod j" focus_switch 2
nwmc bind "$mod k" focus_switch 3

nwmc bind "$mod shift h" resize_window 2
nwmc bind "$mod shift j" resize_window 1
nwmc bind "$mod shift k" resize_window 0
nwmc bind "$mod shift l" resize_window 3

nwmc bind "$mod 1" switch_desktop 0
nwmc bind "$mod 2" switch_desktop 1
